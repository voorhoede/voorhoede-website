name: CD

# on:
#   push:
#     branches: [main]
on: pull_request

jobs:
  deploy-bunny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            BASE_URL=${{ vars.BASE_URL }}
            PIPEDRIVE_API_URL=${{ vars.PIPEDRIVE_API_URL }}
          secret-envs: |
            DATOCMS_API_READ_TOKEN=$$DATOCMS_API_READ_TOKEN
            POSTMARK_API_TOKEN=$$POSTMARK_API_TOKEN
            PREVIEW_SECRET=$$PREVIEW_SECRET
            PIPEDRIVE_API_TOKEN=$$PIPEDRIVE_API_TOKEN
            AKISMET_API_TOKEN=$$AKISMET_API_TOKEN
        env:
          DATOCMS_API_READ_TOKEN: ${{ secrets.DATOCMS_API_READ_TOKEN }}
          POSTMARK_API_TOKEN: ${{ secrets.POSTMARK_API_TOKEN }}
          PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          AKISMET_API_TOKEN: ${{ secrets.AKISMET_API_TOKEN }}

      - name: Update container image on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: app
          image_tag: "${{ github.sha }}"
