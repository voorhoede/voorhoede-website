query HomePage($locale: SiteLocale!) {
  page: homePage(locale: $locale) {
    title
    social: seo {
      title
      description
      image {
        ...image
      }
    }
    sections {
      __typename
      ... on SectionImageCardGridRecord {
        title
        backgroundColor
        cardOrientation
        items {
          id
          title
          body {
            value
          }
          image {
            ...image
          }
          links {
            ...link
          }
        }
      }
      ... on SectionHeaderRecord {
        layout
        style
        title
        subtitle
        illustration {
          ...image
        }
      }
      ... on SectionLogoGridRecord {
        title
        logos {
          ...image
        }
      }
      ... on SectionDialogueCtaRecord {
        variant
        title
        body(markdown: true)
        backgroundColor
        person {
          image {
            ...image
          }
        }
        ctas {
          ...link
        }
      }
      ... on SectionTextImageRecord {
        text {
          value
        }
        image {
          ...image
        }
        layout
      }
      ... on SectionGroupingRecord {
        layout
        items {
          ... on GroupingItemRecord {
            title
            sections {
              __typename
              ... on SectionTextImageRecord {
                text {
                  value
                }
                image {
                  ...image
                }
                layout
              }
            }
          }
        }
      }
    }
    pivots {
      title
      body(markdown: true)
      links {
        ...link
      }
      mailchimpValue
      mailchimpName
      mailchimpId
      formType
      contactPerson {
        name
        lastName
        jobTitle
        image {
          url
          alt
          width
          height
        }
      }
    }
  }
  latestBlogposts: allBlogPosts(
    locale: $locale
    first: 3
    orderBy: _firstPublishedAt_DESC
    filter: { isArchived: { eq: "false" }, _locales: { allIn: [$locale] } }
  ) {
    slug
    title
    date: _firstPublishedAt
    authors {
      name
      image {
        url
        alt
        width
        height
      }
    }
  }
}

fragment image on FileField {
  url
  alt
  width
  height
}

fragment link on RecordInterface {
  __typename
  ... on InternalLinkRecord {
    id
    title
    link {
      __typename
      ... on PageRecord {
        slug
      }
      ... on BlogPostRecord {
        slug
      }
      ... on CaseItemRecord {
        slug
      }
      ... on EventItemRecord {
        slug
      }
      ... on JobRecord {
        slug
      }
      ... on ServiceRecord {
        slug
      }
      ... on PersonRecord {
        slug
      }
      ... on MeetRecord {
        parents: _allReferencingPeople {
          __typename
          slug
        }
      }
      ... on ContactRecord {
        id
      }
    }
  }
  ... on ExternalLinkRecord {
    id
    title
    url
  }
}
