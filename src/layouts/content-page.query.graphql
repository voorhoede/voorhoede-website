query DefaultLayout($locale: SiteLocale) {
  app(locale: $locale) {
    menuItems {
      ... on MenuItemInternalRecord {
        ...menuItemInternal
      }
      ... on MenuItemExternalRecord {
        ...menuItemExternal
      }
      ... on MenuItemGroupRecord {
        ...menuItemGroup
      }
    }
    footerItems {
      ... on MenuItemInternalRecord {
        ...menuItemInternal
      }
      ... on MenuItemExternalRecord {
        ...menuItemExternal
      }
      ... on MenuItemGroupRecord {
        ...menuItemGroup
      }
    }
    socials {
      ... on SocialRecord {
        id
        url
        icon {
          name
          title
        }
      }
    }
    certificates {
      ... on MenuItemInternalRecord {
        ...menuItemInternal
      }
      ... on MenuItemExternalRecord {
        ...menuItemExternal
      }
    }
    legalItems {
      ... on VariableBlockRecord {
        id
        variable {
          title
          value
          displayTitle
        }
      }
    }
    privacy {
      ... on ExternalLinkRecord {
        id
        title
        url
      }
    }
    contactEmail {
      title
      emailAddress
    }
  }
}

fragment image on FileField {
  url
  alt
  width
  height
}

fragment linkTarget on RecordInterface {
  __typename
  ... on PageRecord {
    slug
  }
  ... on BlogPostRecord {
    slug
  }
  ... on CaseItemRecord {
    slug
  }
  ... on EventRecord {
    slug
  }
  ... on HomePageRecord {
    id
  }
}

fragment menuItemInternal on MenuItemInternalRecord {
  __typename
  id
  title
  style
  image {
    ...image
  }
  link {
    ...linkTarget
  }
}

fragment menuItemExternal on MenuItemExternalRecord {
  __typename
  id
  title
  style
  link
  image {
    ...image
  }
}

fragment menuItemContact on MenuItemContactRecord {
  __typename
  id
  title
  style
  contact {
    ... on PhoneLinkRecord {
      __typename
      id
      title
      phoneNumber
      action
      style
    }
    ... on EmailLinkRecord {
      __typename
      id
      title
      emailAddress
      style
    }
  }
}

fragment menuItemGroup on MenuItemGroupRecord {
  __typename
  id
  title
  items {
    ... on MenuItemInternalRecord {
      ...menuItemInternal
    }
    ... on MenuItemExternalRecord {
      ...menuItemExternal
    }
    ... on MenuItemContactRecord {
      ...menuItemContact
    }
    ... on MenuItemGroupRecord {
      id
      title
    }
  }
}
